services:
  # =========================
  # POSTGRES (port hôte 5433)
  # =========================
  postgres:
    image: postgres:15
    container_name: agri_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: violette
      POSTGRES_DB: agri_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agri-net

  # =========================
  # AUTH SERVICE (NestJS)
  # =========================
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: violette

      POSTGRES_DB: agri_platform
      JWT_SECRET: SECRET_KEY
    ports:
      - "3001:3001"
    networks:
      - agri-net

  # =========================
  # PRICE DB
  # =========================
  price-db:
    image: postgres:15
    container_name: price-db
    environment:
      POSTGRES_USER: price_user
      POSTGRES_PASSWORD: violette

      POSTGRES_DB: price_db
    ports:
      - "5434:5432"
    networks:
      - agri-net

  # =========================
  # WEATHER CACHE
  # =========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - agri-net

  # =========================
  # ANALYTICS DB (MongoDB)
  # =========================
  analytics-db:
    image: mongo:7
    container_name: analytics-db
    ports:
      - "27017:27017"
    networks:
      - agri-net

  # =========================
  # GATEWAY (NestJS)
  # =========================
  gateway:
    build:
      context: ./backend/gateway
    container_name: agri-platform-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
    environment:
      PORT: 3000
      JWT_SECRET: SECRET_KEY

      FARMER_SERVICE_BASE_URL: http://farmer-service:8001
      WEATHER_SERVICE_BASE_URL: http://weather-service:8002
      PRICE_SERVICE_BASE_URL: http://price-service:8003
    ports:
      - "3000:3000"
    networks:
      - agri-net

  # =========================
  # ZOOKEEPER
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - agri-net

  # =========================
  # KAFKA
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092 # docker containers utilisent kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - agri-net

  # =========================
  # SPARK MASTER
  # =========================
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
      - "7077:7077"
    networks:
      - agri-net

  # =========================
  # SPARK WORKER
  # =========================
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - agri-net

  # =========================
  # SPARK JOB (Structured Streaming)
  # =========================
  spark-job:
    image: apache/spark:3.5.1
    container_name: spark-job
    depends_on:
      - spark-master
      - kafka
      - postgres
    volumes:
      - ./spark:/app/spark
    networks:
      - agri-net
    command: >
      /opt/spark/bin/spark-submit --master spark://spark-master:7077 /app/spark/job_spark.py

  # =========================
  # TEMPORAL (orchestration)
  # =========================
  temporal:
    image: temporalio/auto-setup:1.21
    container_name: temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=violette
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - agri-net

  # =========================
  # FARMER SERVICE (FastAPI)
  # =========================
  farmer-service:
    build:
      context: ./backend/farmer-service
    container_name: farmer-service
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: violette
      POSTGRES_DB: agri_platform

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8001"
    networks:
      - agri-net

  # =========================
  # WEATHER SERVICE (FastAPI)
  # =========================
  weather-service:
    build:
      context: ./backend/weather-service
    container_name: weather-service
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    ports:
      - "8002:8002"
    networks:
      - agri-net

  # =========================
  # PRICE SERVICE (FastAPI)
  # =========================
  price-service:
    build:
      context: ./backend/price-service
    container_name: price-service
    restart: unless-stopped
    depends_on:
      - price-db
    environment:
      POSTGRES_HOST: price-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: price_user
      POSTGRES_PASSWORD: violette
      POSTGRES_DB: price_db
    ports:
      - "8003:8003"
    networks:
      - agri-net

  # =========================
  # ORCHESTRATOR (Temporal Worker)
  # =========================
  orchestrator:
    build:
      context: ./backend/orchestrator
    container_name: orchestrator
    restart: unless-stopped
    depends_on:
      - temporal
      - kafka
      - weather-service
      - price-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: agriculteurs-topic
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: farmer-task-queue
      WEATHER_SERVICE_URL: http://weather-service:8002
      PRICE_SERVICE_URL: http://price-service:8003
    networks:
      - agri-net

volumes:
  pgdata:

networks:
  agri-net:

